# FreeNodeSeeker Example Configuration
# Copy this to fns.yaml and customize.

# --- Sources ---
sources:
  github:
    enabled: true
    search_queries:
      - "free v2ray subscription"
      - "v2ray config"
      - "clash node free"
      - "vless free"
      - "v2ray节点"
    max_results: 30
    # GitHub now REQUIRES authentication for code search.
    # Create a classic token with no scopes at https://github.com/settings/tokens
    # token: "ghp_xxxxxxxxxxxx"

  web_scrape:
    enabled: true
    urls: []
    request_delay: 1.0
    # proxy: "http://127.0.0.1:7890"

  api:
    enabled: true
    urls: []

# --- Validator ---
validator:
  concurrency: 50
  timeout: 5.0
  retries: 1
  test_url: "http://www.google.com/"

# --- Output ---
output:
  dir: ./output
  formats:
    - clash
    - base64
    - json
  clash:
    port: 7890
    socks-port: 7891
    allow-lan: false
    mode: Rule
    log-level: info

# Target number of alive nodes in output. 0 = no limit.
max_alive_nodes: 10

# --- Scheduler ---
scheduler:
  interval_hours: 6

# --- Logging ---
logging:
  level: INFO
  # file: ./logs/fns.log
